  <style>

      --bg: #fff8fb;

<body>
  <div class="page">
    <header>
      <div class="logo">🪽</div>
      <h1>羽根の置き場</h1>
      <p class="subtitle">今日の気持ちを、そっと置いていく場所。</p>
    </header>

    <main>
      <section class="card form-card">
        <div class="field">
          <label for="password">パスワード</label>
          <input
            id="password"
            type="password"
            placeholder="パスワードを入力"
            autocomplete="current-password"
          />
        </div>

        <div class="field">
          <label for="title">タイトル</label>
          <input
            id="title"
            type="text"
            maxlength="100"
            placeholder="例：今日のこと"
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label for="body">本文</label>
          <textarea
            id="body"
            maxlength="5000"
            placeholder="ここに日記を書いてね。"
          ></textarea>
        </div>

        <div class="buttons">
          <button id="saveBtn" class="save-btn" type="button">保存する</button>
          <button id="reloadBtn" class="reload-btn" type="button">一覧を読む</button>
        </div>

        <div id="status" class="status"></div>
      </section>

      <div class="section-title">
        <h2>日記一覧</h2>
        <div id="count" class="count"></div>
      </div>

      <section id="entries" class="entries">
        <div class="empty">パスワードを入力して「一覧を読む」を押してね。</div>
      </section>

      <p class="small-note">
        ※ パスワードはこのHTMLには保存していません。<br />
        保存先は Cloudflare D1 です。
      </p>
    </main>
  </div>

  <script>
    const API_BASE = "https://api.cetus.fun";

    const passwordInput = document.getElementById("password");
    const titleInput = document.getElementById("title");
    const bodyInput = document.getElementById("body");
    const saveBtn = document.getElementById("saveBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const statusEl = document.getElementById("status");
    const entriesEl = document.getElementById("entries");
    const countEl = document.getElementById("count");

    saveBtn.addEventListener("click", saveDiary);
    reloadBtn.addEventListener("click", loadDiary);

    function getPassword() {
      return passwordInput.value.trim();
    }

    function checkPassword() {
      if (!getPassword()) {
        showStatus("パスワードを入力してね。", "error");
        passwordInput.focus();
        return false;
      }
      return true;
    }

    async function saveDiary() {
      if (!checkPassword()) return;

      const title = titleInput.value.trim();
      const body = bodyInput.value.trim();

      if (!title) {
        showStatus("タイトルを入力してね。", "error");
        titleInput.focus();
        return;
      }

      if (!body) {
        showStatus("本文を入力してね。", "error");
        bodyInput.focus();
        return;
      }

      saveBtn.disabled = true;
      reloadBtn.disabled = true;
      showStatus("保存しています…", "");

      try {
        const response = await fetch(`${API_BASE}/api/diary`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-App-Password": getPassword()
          },
          body: JSON.stringify({ title, body })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "保存に失敗しました。");
        }

        titleInput.value = "";
        bodyInput.value = "";

        showStatus("保存しました。", "ok");
        await loadDiary();
      } catch (error) {
        showStatus(`保存できませんでした：${error.message}`, "error");
      } finally {
        saveBtn.disabled = false;
        reloadBtn.disabled = false;
      }
    }

    async function loadDiary() {
      if (!checkPassword()) return;

      reloadBtn.disabled = true;
      showStatus("読み込んでいます…", "");

      try {
        const response = await fetch(`${API_BASE}/api/diary`, {
          headers: {
            "X-App-Password": getPassword()
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "読み込みに失敗しました。");
        }

        renderEntries(data.entries || []);
        showStatus("読み込みました。", "ok");
      } catch (error) {
        entriesEl.innerHTML = "";
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = `日記を読み込めませんでした：${error.message}`;
        entriesEl.appendChild(empty);
        countEl.textContent = "";
        showStatus(`読み込みできませんでした：${error.message}`, "error");
      } finally {
        reloadBtn.disabled = false;
      }
    }

    function renderEntries(entries) {
      entriesEl.innerHTML = "";
      countEl.textContent = `${entries.length}件`;

      if (entries.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "まだ日記がありません。最初の一枚を書いてみよう。";
        entriesEl.appendChild(empty);
        return;
      }

      for (const entry of entries) {
        const article = document.createElement("article");
        article.className = "entry";

        const title = document.createElement("h3");
        title.className = "entry-title";
        title.textContent = entry.title;

        const date = document.createElement("div");
        date.className = "entry-date";
        date.textContent = formatDate(entry.created_at);

        const body = document.createElement("p");
        body.className = "entry-body";
        body.textContent = entry.body;

        article.appendChild(title);
        article.appendChild(date);
        article.appendChild(body);

        entriesEl.appendChild(article);
      }
    }

    function formatDate(value) {
      if (!value) return "";

      const normalized = value.includes("T")
        ? value
        : value.replace(" ", "T") + "Z";

      const date = new Date(normalized);

      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function showStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status";

      if (type) {
        statusEl.classList.add(type);
      }
    }
  </script>
</body>
</html>
